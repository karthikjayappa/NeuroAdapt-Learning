<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tell Us About Your Learning Needs - NeuroAdapt Edu</title>
    <!-- Link to the CSS file for this page -->
    <link rel="stylesheet" href="get-started.css">
</head>
<body>

    <div class="container">
        <!-- 1. Introduction Section -->
        <h1>Tell Us About Your Learning Needs</h1>
        <p class="intro-text">Everyone learns differently. Help us understand your learning needs so we can adapt the platform for you.</p>

        <!-- 2. Learning Challenges Form -->
        <form id="needsForm">
            
            <!-- Student Name -->
            <div class="form-group">
                <label for="studentName">Student Name</label>
                <input type="text" id="studentName" placeholder="Enter your name" required>
            </div>

            <!-- Age -->
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" placeholder="Enter your age" min="5" max="100" required>
            </div>

            <!-- Learning Difficulties (Checkboxes) -->
            <div class="form-group">
                <label>Learning Difficulties</label>
                <div class="options-group">
                    <label class="option-item">
                        <input type="checkbox" name="difficulty" value="ADHD">
                        ADHD (Difficulty focusing)
                    </label>
                    <label class="option-item">
                        <input type="checkbox" name="difficulty" value="Dyslexia">
                        Dyslexia (Reading difficulty)
                    </label>
                    <label class="option-item">
                        <input type="checkbox" name="difficulty" value="SlowReading">
                        Slow Reading Speed
                    </label>
                    <label class="option-item">
                        <input type="checkbox" name="difficulty" value="LongText">
                        Difficulty Understanding Long Text
                    </label>
                </div>
            </div>

            <!-- 3. Submit Button -->
            <button type="submit" class="submit-btn">Generate My Learning Interface</button>
        </form>

        <!-- 4. JavaScript Output Area -->
        <div id="results-area">
            <h3>Personalized Recommendations:</h3>
            <ul id="recommendation-list"></ul>
        </div>
    </div>

    <!-- Link to the JavaScript file for this page -->
    <script src="get-started.js"></script>
</body>
</html>
