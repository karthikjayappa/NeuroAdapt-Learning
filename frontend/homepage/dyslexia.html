<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuroAdapt AI Chatbot</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: sans-serif; margin: 20px; background: #f9f9f9; }
    h2 { text-align: center; }
    #chat { 
      border: 1px solid #ccc; 
      padding: 10px; 
      height: 400px; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      background: #fff;
    }
    .message { margin: 5px 0; padding: 8px 12px; border-radius: 8px; max-width: 70%; word-wrap: break-word; }
    .user { background-color: #dcf8c6; align-self: flex-end; }
    .ai { background-color: #f1f0f0; align-self: flex-start; }
    #input-area { margin-top: 10px; display: flex; gap: 5px; }
    #input-area input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    #input-area button { padding: 8px 12px; border-radius: 4px; border: none; background-color: #007bff; color: white; cursor: pointer; }
    #input-area button:hover { background-color: #0056b3; }
    #loading { display: none; font-style: italic; color: #555; margin-top: 5px; }
  </style>
</head>
<body>
  <h2>NeuroAdapt AI Chatbot</h2>
  <div id="chat"></div>
  <div id="loading">AI is typing...</div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Type your message...">
    <button id="send-btn">Send</button>
    <button id="reset-btn">Reset Chat</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const resetBtn = document.getElementById('reset-btn');
    const loading = document.getElementById('loading');

    // Append message to chat
    function appendMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = 'message ' + sender;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    // Send message to backend
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      appendMessage(text, 'user');
      input.value = '';
      loading.style.display = 'block';

      try {
        const res = await fetch("http://localhost:3000/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (data.success) {
          appendMessage(data.response, 'ai');
        } else {
          appendMessage("Error: " + (data.error || "No response"), 'ai');
        }
      } catch (err) {
        appendMessage("Error: Could not reach server.", 'ai');
      } finally {
        loading.style.display = 'none';
      }
    }

    // Reset chat
    async function resetChat() {
      try {
        await fetch("http://localhost:3000/api/reset", { method: "POST" });
        chat.innerHTML = '';
      } catch (err) {
        appendMessage("Error: Could not reset chat.", 'ai');
      }
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    resetBtn.addEventListener('click', resetChat);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
