<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tell Us About Your Learning Needs - NeuroAdapt Edu</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="get-started.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Tell Us About Your Learning Needs</h1>
            <p class="intro">
                NeuroAdapt Edu helps you study smarter. Upload your learning material and select your specific needs so we can tailor the analysis just for you.
            </p>
        </header>

        <form id="needsForm">
            <!-- Student Details -->
            <div class="form-group">
                <label for="studentName">Student Name</label>
                <input type="text" id="studentName" name="studentName" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="5" max="100" placeholder="e.g. 12" required>
            </div>

            <!-- Learning Difficulties -->
            <div class="form-group">
                <label>Learning Difficulties (Select all that apply)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="difficulty" value="ADHD">
                        <span>ADHD (Difficulty focusing)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="difficulty" value="Dyslexia">
                        <span>Dyslexia (Reading difficulty)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="difficulty" value="SlowReading">
                        <span>Slow Reading Speed</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="difficulty" value="LongText">
                        <span>Difficulty Understanding Long Text</span>
                    </label>
                </div>
            </div>

            <!-- PDF Upload -->
            <div class="form-group">
                <label for="pdfUpload">Upload Learning Material (PDF)</label>
                <input type="file" id="pdfUpload" name="pdfUpload" accept=".pdf" required>
                <small id="file-name-display">No file chosen</small>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="analyzeBtn">Analyze</button>
        </form>

        <!-- Results Area (Hidden by default) -->
        <div id="results-area" class="hidden">
            <h2>Your Personalized Analysis</h2>
            <div id="loading-spinner" class="hidden">
                <p>Analyzing PDF and generating recommendations...</p>
            </div>
            <div id="final-results" class="results-content hidden">
                <!-- Dynamic content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Link to JS -->
    <script src="get-started.js"></script>
</body>
</html>
