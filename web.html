<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroAdapt Edu – AI Learning Assistant</title>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- Link to CSS -->
    <link rel="stylesheet" href="web.css">
</head>
<body>

    <header>
        <h1><i class="fas fa-brain"></i> NeuroAdapt Edu</h1>
        <p>AI-Powered Learning Assistant</p>
    </header>

    <div class="container">
        
        <!-- API Key Input -->
        <div class="api-key-section">
            <label for="apiKey"><strong>OpenAI API Key:</strong></label>
            <input type="password" id="apiKey" placeholder="sk-..." value="">
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <h2>Upload Study Material</h2>
            <p>Upload a PDF or Text file to get started.</p>
            
            <div class="file-input-wrapper">
                <label for="file-upload" class="custom-file-upload">
                    <i class="fas fa-cloud-upload-alt"></i> Choose File
                </label>
                <input id="file-upload" type="file" accept=".pdf,.txt"/>
                <span id="file-name" style="margin-left: 10px; color: var(--text-light);">No file chosen</span>
            </div>

            <button id="analyze-btn" class="btn-analyze" disabled>Analyze with AI</button>
        </div>

        <div class="loader" id="loader"></div>

        <!-- Results Section -->
        <div class="results-grid" id="results-area" style="display: none;">
            
            <!-- 1. Easy Notes -->
            <div class="card full-width">
                <h2><i class="fas fa-list-ul"></i> Easy-to-Understand Notes</h2>
                <ul class="notes-list" id="notes-content">
                    <!-- Content injected here -->
                </ul>
            </div>

            <!-- 2. Summary -->
            <div class="card full-width">
                <h2><i class="fas fa-align-left"></i> Summary</h2>
                <p id="summary-content">
                    <!-- Content injected here -->
                </p>
            </div>

            <!-- 3. Flashcards -->
            <div class="card">
                <h2><i class="fas fa-layer-group"></i> Flashcards</h2>
                <div class="flashcard-container" id="flashcards-content">
                    <!-- Flashcards injected here -->
                </div>
            </div>

            <!-- 4. Video Suggestions -->
            <div class="card">
                <h2><i class="fab fa-youtube"></i> Video Suggestions</h2>
                <div id="videos-content">
                    <!-- Video suggestions injected here -->
                </div>
            </div>

        </div>
    </div>

    <!-- Link to JS -->
    <script src="web.js"></script>
</body>
</html>
